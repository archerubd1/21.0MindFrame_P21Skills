<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civic Voice Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY CENTER */
body {
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #fdf2f8, #f5f3ff);
}

/* SLIDE */
.slide {
    width: 1280px;
    height: 720px;
    position: relative;
    background: linear-gradient(135deg, #fdf2f8, #f5f3ff);
    border-radius: 16px;
    overflow: hidden;
}

/* HEADER */
.header {
    position: absolute;
    top: 0;
    width: 100%;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    
    font-size: 14px;
    color: #6b7280;
    font-weight: 500;
}

/* MAIN CONTENT */
.main {
    position: absolute;
    top: 80px;
    bottom: 120px;
    width: 100%;
    
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px;
}

.main h1 {
    font-size: 52px;
    color: #7c3aed;
}

.main p {
    margin-top: 15px;
    font-size: 18px;
    color: #6b7280;
}

/* NAVBAR */
.navbar {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    padding: 12px 25px;
    
    display: flex;
    justify-content: space-between;
    
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    
    border-radius: 12px;
}

/* NAV LINKS */
.nav-link {
    cursor: pointer;
    font-size: 14px;
    color: #6b7280;
}

.nav-link.next {
    color: #7c3aed;
    font-weight: 600;
}

/* FOOTER */
.footer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 50px;
    
    display: flex;
    justify-content: center;
    align-items: center;
    
    font-size: 12px;
    color: #6b7280;
    
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
}
</style>
</head>

<body>

<div class="slide">

    <!-- HEADER -->
    <div class="header">
        EduuAspire21.0 Skills |
        21st Century Skills |
         Media Literacy
    </div>

    <!-- CONTENT -->
    <div class="main">
        <div>
            <h1>Civic Voice Lab</h1>
            <p>	College & Youth – Applied Competence</p>
        </div>
    </div>

    <!-- NAVBAR -->
    <div class="navbar">
        <!-- For Slide 1: remove this -->
        <!-- <div class="nav-link" onclick="prev()"></div> -->

        <div></div>

        <div class="nav-link next" onclick="next()">
            Overview →
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        Licenced & Powered By Astrl Mind Technologies © 2026–2033
    </div>

</div>

<script>
function next() {
    window.location.href = "d2.html"; // change per slide
}

function prev() {
   // window.location.href = "c1.html"; // change per slide
}

document.addEventListener('keydown', function(e) {
    if (e.key === "ArrowRight") next();
    if (e.key === "ArrowLeft") prev();
});
</script>

</body>
</html>
