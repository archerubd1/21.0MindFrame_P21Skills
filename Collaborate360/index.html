<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Collaborate 360°</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>

<style>
body {
    margin: 0;
    overflow: hidden;
    background-color: #f8f9fa;
    font-family: 'Inter', sans-serif;
}

.slide-container {
    position: relative;
    width: 1280px;
    height: 720px;
    margin: auto;
    background-color: #FFFFFF;
}

/* Header */
.header {
    position: absolute;
    left: 40px;
    top: 30px;
    font-size: 14px;
    color: #64748B;
    text-transform: uppercase;
}

/* Title */
.title {
    position: absolute;
    top: 280px;
    width: 100%;
    text-align: center;
    font-family: 'Montserrat';
    font-size: 76px;
    font-weight: 800;
    color: #0F172A;
}

/* Subtitle */
.subtitle {
    position: absolute;
    top: 400px;
    width: 100%;
    text-align: center;
    font-size: 28px;
    color: #0073CF;
}

/* Icons */
.icons {
    position: absolute;
    top: 500px;
    width: 100%;
    text-align: center;
}

.icons i {
    margin: 0 15px;
    font-size: 24px;
    color: #004B87;
}

/* Footer */
.footer {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 12px;
    color: #94A3B8;
}

/* Navigation */
.navbar {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    padding: 10px 25px;
    display: flex;
    justify-content: space-between;
    background: rgba(255, 218, 185, 0.25);
    backdrop-filter: blur(8px);
    border-top: 1px solid rgba(255,255,255,0.5);
    border-radius: 10px;
}

.nav-link {
    font-size: 14px;
    cursor: pointer;
    transition: 0.25s ease;
}

.nav-link:hover {
    opacity: 0.7;
    transform: translateY(-2px);
}
.badge {
    position: absolute;
    top: 200px;
    left: 50%;
    transform: translateX(-50%);
    background: #E2EDF6;
    color: #0073CF;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
}
</style>
</head>

<body>

<div class="slide-container">

    <!-- Header -->
    <div class="header">
        EduuAspire21.0 Skills | 21st Century Skills | Digital Literacy
    </div>
    <div class="badge">ADULTS & PROFESSIONALS</div>

    <!-- Title -->
    <div class="title">Collaborate 360°</div>

    <!-- Subtitle -->
    <div class="subtitle">Strategic Mastery in Global Collaboration</div>

    <!-- Icons -->
    <div class="icons">
        <i class="fas fa-globe"></i>
        <i class="fas fa-cloud"></i>
        <i class="fas fa-shield-alt"></i>
    </div>

    <!-- Navigation -->
    <div class="navbar">
        <div class="nav-link" onclick="prev()"></div>
        <div class="nav-link" onclick="next()">Program Overview →</div>
    </div>

    <!-- Footer -->
    <div class="footer">
        Licenced & Powered By Astrl Mind Technologies © 2026–2033
    </div>

</div>

<script>

// Click Navigation
function next() {
    window.location.href = "s2.html";
}


// ✅ Keyboard Navigation (UPDATED AS REQUESTED)
document.addEventListener('keydown', function (e) {

    const activeTag = document.activeElement.tagName.toLowerCase();
    if (activeTag === 'input' || activeTag === 'textarea') return;

    if (e.key === 'ArrowRight') {
        window.location.href = 'f2.html';
    }

    if (e.key === 'ArrowLeft') {
        // First slide → no previous
    }
});

</script>

</body>
</html>
