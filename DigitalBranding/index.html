<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Digital Branding 101 - Title Slide</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Poppins:wght@500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        /* Base Reset & Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Slide Container */
        .slide-container {
            width: 1280px;
            height: 720px;
            background-color: #FFE5D9; /* Peach background */
            color: #1A252F; /* Dark text */
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Typography */
        h1, h2, h3, p {
            margin: 0;
        }

        /* Layout Elements */
        .header {
            padding: 40px 60px 0 60px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            z-index: 10;
        }

        .header p {
            font-size: 14px;
            font-weight: 700;
            color: #2C3E50;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            color: #E07A5F;
            font-size: 18px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
            padding: 0 120px;
        }

        .footer {
            padding: 0 60px 30px 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .footer p {
            font-size: 12px;
            font-weight: 500;
            color: #4A5568;
            letter-spacing: 0.5px;
        }

        /* Content Styling */
        .badge {
            background-color: #1A252F;
            color: #FFE5D9;
            padding: 10px 24px;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: inline-block;
        }

        .title {
            font-family: 'Poppins', sans-serif;
            font-size: 88px;
            font-weight: 800;
            color: #1A252F;
            line-height: 1.1;
            letter-spacing: -1.5px;
            margin-bottom: 24px;
        }

        .title-highlight {
            color: #E07A5F; /* Darker contrasting peach/terracotta */
        }

        .accent-line {
            width: 80px;
            height: 6px;
            background-color: #E07A5F;
            border-radius: 3px;
            margin: 0 auto 30px auto;
        }

        .tagline {
            font-family: 'Inter', sans-serif;
            font-size: 28px;
            font-weight: 400;
            color: #34495E;
            font-style: italic;
        }

        /* Decorative Background Elements */
        .deco-circle-1 {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background-color: #FFDAC1;
            top: -200px;
            right: -150px;
            z-index: 1;
        }

        .deco-circle-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background-color: #1A252F;
            opacity: 0.03;
            bottom: -100px;
            left: -100px;
            z-index: 1;
        }

        .deco-dots {
            position: absolute;
            top: 150px;
            left: 80px;
            font-size: 24px;
            color: #E07A5F;
            opacity: 0.4;
            letter-spacing: 8px;
            line-height: 1.5;
            z-index: 1;

        }
        .page-navigation{
    position: absolute;
    bottom: 70px;      /* Above the copyright */
    right: 35px;
    left: auto;
    z-index: 9999;
}

.next-btn{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    background: #1A252F;       /* Dark navy box */
    color: #FFE5D9;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    border-radius: 30px;
    border: 2px solid #1A252F;
    box-shadow: 0 8px 20px rgba(26,37,47,.25);
    transition: all .3s ease;
}

.next-btn:hover{
    background: #E07A5F;
    border-color: #E07A5F;
    color: #fff;
    transform: translateY(-2px);
}
    </style>
</head>
<body>
<div class="slide-container">
<!-- Decorative Elements -->
<div class="deco-circle-1"></div>
<div class="deco-circle-2"></div>
<div class="deco-dots">
<p>• • • •</p>
<p>• • • •</p>
<p>• • • •</p>
</div>
<!-- Header -->
<div class="header">
<p><i class="fas fa-layer-group header-icon"></i> EduuAspire21.0 Skills <span style="color: #E07A5F; margin: 0 8px;">|</span> 21st Century Skills <span style="color: #E07A5F; margin: 0 8px;">|</span> Digital Literacy</p>
</div>
<!-- Main Content -->
<div class="main-content">
<div class="badge">
<p>College &amp; Youth – Applied Competence</p>
</div>
<p class="title">Digital Branding <span class="title-highlight">101</span></p>
<div class="accent-line"></div>
<p class="tagline">"Build Your Digital Identity, Shape Your Future"</p>
</div>
<!-- Footer -->
<div class="footer">
<p>Licenced &amp; Powered By Astrl Mind Technologies copyright 2026-2033</p>
</div>
<!-- Navigation -->
<div class="page-navigation">
    <a href="f2.html" class="next-btn">
        Program Overview <i class="fas fa-arrow-right"></i>
    </a>
</div>

</div> <!-- slide-container -->
<script>
document.addEventListener('keydown', function (e) {

    const activeTag = document.activeElement.tagName.toLowerCase();
    if (activeTag === 'input' || activeTag === 'textarea') return;

    if (e.key === 'ArrowRight') {
        window.location.href = 'f2.html';
    }

    if (e.key === 'ArrowLeft') {
        // First slide → no previous
    }
});
</script>
</body>
</html>
