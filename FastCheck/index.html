<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Fact-Check Bootcamp</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root {
    --neon-cyan: #00f3ff;
    --electric-purple: #bc13fe;
    --dark-bg: #050a14;
}

html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    background-color: var(--dark-bg);
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    color: white;
}

/* FULLSCREEN */
.slide-container {
    width: 100vw;
    height: 100vh;
    position: relative;
    background-color: #020408;
    background-image: 
        linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
}

/* ✅ TOP HEADER (LIKE IMAGE) */
.header-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    border-bottom: 1px solid rgba(0, 243, 255, 0.3);
    background: rgba(5, 10, 20, 0.85);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--neon-cyan);
    letter-spacing: 2px;
    z-index: 50;
}

/* MAIN CONTENT */
.content-area {
    position: absolute;
    top: 40px;
    bottom: 40px;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* TITLE */
h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 80px;
    letter-spacing: 4px;
    margin: 0;
    text-transform: uppercase;
    text-shadow: 2px 2px 0px var(--electric-purple), -2px -2px 0px rgba(0,243,255,0.5);
}

h2 {
    font-size: 30px;
    color: var(--neon-cyan);
    margin-top: 10px;
    border-left: 4px solid var(--neon-cyan);
    padding: 5px 20px;
}

/* TAGLINE */
.tagline-container {
    display: flex;
    gap: 20px;
    margin-top: 40px;
}

.tagline-item {
    display: flex;
    gap: 10px;
    padding: 10px 20px;
    border: 1px solid rgba(188,19,254,0.5);
    background: rgba(188,19,254,0.1);
}

.icon-box {
    color: var(--neon-cyan);
}

/* ✅ FOOTER LIKE IMAGE */
.footer-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 35px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-top: 1px solid rgba(188, 19, 254, 0.4);
    background: rgba(5, 10, 20, 0.95);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.7);
    z-index: 50;
}

/* BUTTON FIX */
a {
    z-index: 9999 !important;
}
</style>
</head>

<body>

<div class="slide-container">

<!-- ✅ HEADER -->
<div class="header-bar">
    <div>EDUUASPIRE 21.0 SKILLS |21ST CENTURY SKILLS| DIGITAL LITERACY</div>
</div>

<!-- MAIN CONTENT -->
<div class="content-area">
    <h1>Fact-Check<br>Bootcamp</h1>
    <h2>Navigating Deepfakes, Bias & Data Truth</h2>

    <div class="tagline-container">
        <div class="tagline-item">
            <i class="fas fa-brain icon-box"></i>
            <p>Critical Thinking</p>
        </div>
        <div class="tagline-item">
            <i class="fas fa-robot icon-box"></i>
            <p>AI Awareness</p>
        </div>
        <div class="tagline-item">
            <i class="fas fa-shield-alt icon-box"></i>
            <p>Media Literacy</p>
        </div>
    </div>
</div>

<!-- ✅ FOOTER -->
<div class="footer-bar">
    Licensed and powered by Astrl mind Technologies copyright 2026–2033
</div>

<!-- NEXT BUTTON -->
<a href="f2.html"
   class="absolute bottom-16 right-12 px-6 py-3 bg-gray-900 text-white text-sm uppercase hover:bg-gray-800 rounded-lg">
   Next →
</a>

</div>

<!-- KEYBOARD NAVIGATION -->
<script>
document.addEventListener('keydown', function (e) {
    const tag = document.activeElement.tagName.toLowerCase();
    if (tag === 'input' || tag === 'textarea') return;

    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
        window.location.href = 'f2.html';
    }
});
</script>

</body>
</html>
