<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Question Lab - Fact vs Opinion</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

<style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #FFF6E9, #FFE5D9);
        font-family: 'Poppins', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .slide-container {
        width: 1280px;
        height: 720px;
        position: relative;
        transform: scale(0.9);
        transform-origin: center;
    }

    /* Header */
    .header {
        position: absolute;
        top: 0;
        width: 100%;
        height: 50px;
        background: rgba(255,255,255,0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        color: #555;
        font-weight: 500;
    }

    /* Title */
    .title {
        position: absolute;
        top: 110px;
        width: 100%;
        text-align: center;
        font-size: 56px;
        font-weight: 700;
        color: #333;
    }

    .highlight {
        color: #E87A5D;
    }

    /* Cards */
    .card {
        position: absolute;
        left: 240px;
        width: 800px;
        height: 80px;
        background: rgba(255,255,255,0.8);
        border-radius: 12px;
        display: flex;
        align-items: center;
        padding: 0 25px;
        gap: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .card i {
        font-size: 28px;
        width: 50px;
        text-align: center;
    }

    .card p {
        margin: 0;
        font-size: 24px;
        font-weight: 600;
        color: #444;
    }

    .c1 { top: 230px; }
    .c2 { top: 320px; }
    .c3 { top: 410px; }
    .c4 { top: 500px; }

    /* Navigation */
    .nav {
        position: absolute;
        bottom: 50px;
        left: 50%;
        transform: translateX(-50%);
        width: 900px;
        height: 60px;
        background: rgba(255, 204, 170, 0.5);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 30px;
    }

    .nav-item {
        font-weight: 600;
        color: #444;
        display: flex;
        gap: 8px;
        align-items: center;
        cursor: pointer;
    }

    /* Footer */
    .footer {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 30px;
        background: #f0f0f0;
        text-align: center;
        font-size: 12px;
        color: #888;
        display: flex;
        align-items: center;
        justify-content: center;
    }

</style>
</head>

<body>

<div class="slide-container">

    <!-- Header -->
    <div class="header">
        EduuAspire21.0 Skills | 21st Century Skills | Information Literacy
    </div>

    <!-- Title -->
    <div class="title">
        Fact <span class="highlight">vs</span> Opinion
    </div>

    <!-- Cards -->
    <div class="card c1">
        <i class="fa-solid fa-scale-balanced" style="color:#4A90E2;"></i>
        <p>Fact: can be proven with evidence</p>
    </div>

    <div class="card c2">
        <i class="fa-solid fa-heart" style="color:#E87A5D;"></i>
        <p>Opinion: personal belief or feeling</p>
    </div>

    <div class="card c3">
        <i class="fa-solid fa-check-double" style="color:#27AE60;"></i>
        <p>Check another source</p>
    </div>

    <div class="card c4">
        <i class="fa-solid fa-eye" style="color:#9B59B6;"></i>
        <p>Look for feeling words</p>
    </div>

    <!-- Navigation -->
     <div class="nav">
    <div class="nav-item" onclick="window.location.href='f9.html'">
        <i class="fa-solid fa-arrow-left"></i> Search tools
    </div>

    <div class="nav-item" onclick="window.location.href='f11.html'">
        Facts or Opinion <i class="fa-solid fa-arrow-right"></i>
    </div>
</div>
    <!-- Footer -->
    <div class="footer">
        Licensed & Powered By Astrl Mind Technologies © 2026–2033
    </div>

</div>
<script>
document.addEventListener("keydown", function (e) {
    const active = document.activeElement;

    // Disable when typing
    if (active.tagName === "INPUT" || active.tagName === "TEXTAREA") return;

    if (e.key === "ArrowRight") {
        window.location.href = "f11.html";
    }

    if (e.key === "ArrowLeft") {
        window.location.href = "f9.html";
    }
});
</script>

</body>
</html>
