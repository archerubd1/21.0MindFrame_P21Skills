<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Question Lab - Inquiry Map</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #FFF6E9, #FFE5D9);
    font-family: 'Poppins', sans-serif;
}

.slide-container {
    width: 1280px;
    height: 720px;
    position: relative;
}

/* Header */
.header {
    position: absolute;
    top: 0;
    width: 100%;
    height: 50px;
    background: rgba(255,255,255,0.6);
    text-align: center;
    line-height: 50px;
    font-size: 16px;
    color: #555;
}

/* Title */
.title {
    position: absolute;
    top: 90px;
    width: 100%;
    text-align: center;
    font-size: 48px;
    font-weight: 700;
}

/* Bullet Cards */
.card {
    width: 800px;
    height: 90px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.8);
    border-radius: 16px;
    display: flex;
    align-items: center;
    padding: 0 30px;
    gap: 20px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

.icon {
    font-size: 36px;
}

/* Navigation */
.glass-nav {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 60px;
    background: rgba(255, 204, 170, 0.5);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
}

.nav-item {
    font-size: 16px;
    font-weight: 600;
    color: #444;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
}

/* Footer */
.footer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 28px;
    background: #f0f0f0;
    text-align: center;
    font-size: 12px;
    color: #888;
    line-height: 28px;
}
</style>
</head>

<body>
<div class="slide-container">

<!-- Header -->
<div class="header">
EduuAspire21.0 Skills | 21st Century Skills | Information Literacy
</div>

<!-- Title -->
<div class="title">
What is an <span style="color:#E87A5D;">Inquiry Map</span>?
</div>

<!-- Card 1 -->
<div class="card" style="top: 230px;">
<i class="fa-solid fa-map icon" style="color:#4A90E2;"></i>
<div style="font-size:26px; font-weight:600; color:#444;">
A learning roadmap
</div>
</div>

<!-- Card 2 -->
<div class="card" style="top: 350px;">
<i class="fa-solid fa-sitemap icon" style="color:#E87A5D;"></i>
<div style="font-size:26px; font-weight:600; color:#444;">
Organizes your ideas
</div>
</div>

<!-- Card 3 -->
<div class="card" style="top: 470px;">
<i class="fa-solid fa-brain icon" style="color:#F4B400;"></i>
<div style="font-size:26px; font-weight:600; color:#444;">
Shows your thinking process
</div>
</div>

<!-- Navigation -->
<div class="glass-nav">
<div class="nav-item">
<i class="fa-solid fa-arrow-left"></i> Fact or Opinion
</div>
<div class="nav-item">
Build Map <i class="fa-solid fa-arrow-right"></i>
</div>
</div>

<!-- Footer -->
<div class="footer">
Licenced & Powered By Astrl Mind Technologies copyright 2026-2033
</div>

</div>
<script>
document.addEventListener("keydown", function (e) {
    const active = document.activeElement;

    // Disable when typing
    if (active.tagName === "INPUT" || active.tagName === "TEXTAREA") return;

    if (e.key === "ArrowRight") {
        window.location.href = "f13.html";
    }

    if (e.key === "ArrowLeft") {
        window.location.href = "f11.html";
    }
});
</script>

</body>
</html>
