<!-- SCRIPT -->
<script>
document.addEventListener("keydown", function (e) {
    const active = document.activeElement;

    // Disable when typing
    if (active.tagName === "INPUT" || active.tagName === "TEXTAREA") return;

    if (e.key === "ArrowRight") {
        window.location.href = "f8.html";
    }

    if (e.key === "ArrowLeft") {
        window.location.href = "f6.html";
    }
});
</script>
