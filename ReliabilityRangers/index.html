<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">

<title>Reliability Rangers</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #000;
    font-family: 'Poppins', sans-serif;
}

.slide {
    width: 1280px;
    height: 720px;
    margin: auto;
    position: relative;
    background: linear-gradient(135deg, #0B132B, #071029);
    overflow: hidden;
}

/* HEADER */
.header {
    position: absolute;
    top: 0;
    width: 100%;
    height: 60px;
    background: #1C2541;
    display: flex;
    align-items: center;
    padding-left: 40px;
    color: #E2E8F0;
    font-size: 16px;
    border-bottom: 2px solid #3A86FF;
}

/* BACKGROUND CIRCLES */
.circle {
    position: absolute;
    border-radius: 50%;
    background: #1C2541;
    opacity: 0.4;
}

.circle.left {
    width: 500px;
    height: 500px;
    left: -120px;
    top: -120px;
}

.circle.right {
    width: 400px;
    height: 400px;
    right: -100px;
    bottom: 80px;
}

/* ICONS */
.icons {
    position: absolute;
    top: 130px;
    width: 100%;
    text-align: center;
}

.shield {
    font-size: 120px;
    color: #3A86FF;
}

.search {
    font-size: 60px;
    color: #FFD166;
    position: relative;
    left: -40px;
    top: -20px;
}

/* TITLE */
.title {
    position: absolute;
    top: 300px;
    width: 100%;
    text-align: center;
    font-size: 72px;
    font-weight: 700;
    color: #E2E8F0;
}

/* SUBTITLE */
.subtitle {
    position: absolute;
    top: 410px;
    width: 100%;
    text-align: center;
    font-size: 28px;
    color: #94A3B8;
}

/* PRESENTER */
.presenter {
    position: absolute;
    top: 480px;
    width: 100%;
    text-align: center;
}

.presenter span {
    background: rgba(58,134,255,0.15);
    color: #3A86FF;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 16px;
}

/* NAV BAR */
.nav-bar {
    position: absolute;
    bottom: 90px;
    left: 140px;
    width: 1000px;
    height: 70px;
    background: rgba(255,204,170,0.5);
    backdrop-filter: blur(12px);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
}

/* NAV TEXT */
.nav-center {
    font-weight: 700;
    letter-spacing: 2px;
    color: #1C2541;
}

/* BUTTON */
.nav-btn {
    border: none;
    background: none;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    color: #1C2541;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: 0.2s;
}

.nav-btn:hover {
    transform: translateY(-2px);
    opacity: 0.8;
}

/* FOOTER */
.footer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40px;
    background: #0B132B;
    color: #666;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="slide">

<div class="header">
EduuAspire21.0 Skills | 21st Century Skills | Information Literacy
</div>

<div class="circle left"></div>
<div class="circle right"></div>

<div class="icons">
    <i class="fas fa-shield-alt shield"></i>
    <i class="fas fa-search search"></i>
</div>

<div class="title">Reliability Rangers</div>

<div class="subtitle">
Be Smart. Be Curious. Be Sure.
</div>

<div class="presenter">
    <span>Presented by: [Your Name Here]</span>
</div>

<div class="nav-bar">
    <div></div>

    <div class="nav-center">START MISSION</div>

    <button class="nav-btn" onclick="goToSlide('f2.html')">
        Why It Matters <i class="fas fa-arrow-right"></i>
    </button>
</div>

<div class="footer">
Licenced & Powered By Astrl Mind Technologies copyright 2026-2033
</div>

</div>

<script>
function goToSlide(page){
    window.location.href = page;
}

document.addEventListener("keydown", function(e){
    if(e.key === "ArrowRight"){
        goToSlide("f2.html");
    }
});
</script>

</body>
</html>
