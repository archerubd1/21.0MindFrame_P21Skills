<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Slide 10</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>

<style>
body {
    margin: 0;
    background: #000;
    overflow: hidden;
}

/* FULL SCREEN FIX */
.slide-wrapper {
    width: 1280px;
    height: 720px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.slide-container {
    position: relative;
    width: 1280px;
    height: 720px;
    background-color: #FFF6E9;
    font-family: 'Poppins', sans-serif;

    transform: scale(min(100vw / 1280, 100vh / 720));
    transform-origin: top left;
}

p { margin: 0; line-height: 1.5; }
ul { list-style: none; padding: 0; }

li {
    margin-bottom: 25px;
    padding-left: 45px;
    position: relative;
}

li::before {
    content: "\f00c";
    font-family: "Font Awesome 6 Free";
    font-weight: 900;
    position: absolute;
    left: 0;
    top: 4px;
    color: #2ECC71;
    font-size: 24px;
}
</style>
</head>

<body>

<div class="slide-wrapper">
<div class="slide-container">

<!-- BACKGROUND -->
<div style="position:absolute; left:-100px; top:-100px; width:600px; height:600px; background:rgba(255,229,217,0.4); border-radius:50%;"></div>
<div style="position:absolute; left:800px; top:300px; width:600px; height:600px; background:rgba(255,229,217,0.4); border-radius:50%;"></div>

<!-- TITLE -->
<h1 style="position:absolute;top:80px;width:100%;text-align:center;font-size:42px;">
Plagiarism: Wrong vs Right
</h1>

<!-- LEFT -->
<div style="position:absolute;left:120px;top:200px;width:400px;">
<h2 style="color:#D65A31;">Wrong Way ❌</h2>
<p>Copying exact text without credit</p>
<p style="margin-top:20px;font-style:italic;color:#D65A31;">
"The honeybee is a flying insect native to Eurasia."
</p>
</div>

<!-- RIGHT -->
<div style="position:absolute;left:700px;top:200px;width:400px;">
<h2 style="color:#28a745;">Right Way ✅</h2>
<p>Use your own words + give source</p>
<p style="margin-top:20px;color:#2e7d32;">
Honeybees originally came from Europe and Asia.<br>
<span style="font-size:14px;">(Source: Science Book)</span>
</p>
</div>

<!-- NAV BAR -->
<div style="position:absolute;bottom:0;width:100%;height:80px;background:rgba(255,204,170,0.5);"></div>

<!-- BACK BUTTON -->
<a href="f9.html">
<div style="position:absolute;left:40px;bottom:15px;width:220px;height:50px;background:#fff;border-radius:25px;display:flex;align-items:center;justify-content:center;">
<p style="color:#D65A31;font-weight:600;">
<i class="fa-solid fa-arrow-left"></i> Writing Steps
</p>
</div>
</a>

<!-- NEXT BUTTON -->
<a href="f11.html">
<div style="position:absolute;right:40px;bottom:15px;width:260px;height:50px;background:#fff;border-radius:25px;display:flex;align-items:center;justify-content:center;">
<p style="color:#D65A31;font-weight:600;">
Giving Credit <i class="fa-solid fa-arrow-right"></i>
</p>
</div>
</a>

</div>
<!-- KEYBOARD NAV -->
<script>
document.addEventListener('keydown', function (e) {

    const activeTag = document.activeElement.tagName.toLowerCase();
    if (activeTag === 'input' || activeTag === 'textarea') return;

    // RIGHT → f11 (next slide)
    if (e.key === 'ArrowRight') {
        window.location.href = 'f11.html';
    }

    // LEFT → f9 (previous slide)
    if (e.key === 'ArrowLeft') {
        window.location.href = 'f9.html';
    }

});
</script>


</body>
</html>
