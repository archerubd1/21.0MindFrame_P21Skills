<meta charset="utf-8">

<title>Synthesis &amp; Insight Lab - Cover</title>

        body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    font-family: 'Roboto', sans-serif;
    background-color: #F0F9FF;
    display: flex;
    justify-content: center;   /* CENTER horizontally */
    align-items: center;       /* CENTER vertically */
}
        
        .slide-container {
    width: 1280px;
    height: 720px;
    position: relative;
    display: flex;
    flex-direction: column;
}

        /* Decorative background elements (No CSS Gradients) */
        .bg-circle-1 {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 500px;
            height: 500px;
            background-color: #E0F2FE; /* Sky 100 */
            border-radius: 50%;
            z-index: 0;
        }
        .bg-circle-2 {
            position: absolute;
            bottom: 50px;
            left: -50px;
            width: 300px;
            height: 300px;
            background-color: #E0F2FE;
            border-radius: 50%;
            z-index: 0;
        }

        /* Header */
        .header {
            height: 40px;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            background-color: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            z-index: 20;
            position: absolute;
            top: 0;
        }
        .header-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #546E7A;
            letter-spacing: 0.5px;
        }

        /* Footer */
        .footer {
            height: 30px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            z-index: 20;
            position: absolute;
            bottom: 0;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .footer-text {
            font-family: 'Roboto', sans-serif;
            font-size: 11px;
            color: #90A4AE;
            font-weight: 400;
        }

        /* Navigation - Glassmorphism */
        .nav-bar {
            position: absolute;
            bottom: 30px; /* Above footer */
            left: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            box-sizing: border-box;
            background-color: rgba(255, 218, 185, 0.5); /* Peach semi-transparent */
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.6);
            z-index: 10;
        }
        
        .nav-link {
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #455A64;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .nav-link:hover {
            color: #0288D1;
            transform: translateY(-2px);
        }

        /* Main Content */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            padding-top: 40px; /* offset header */
            padding-bottom: 100px; /* offset nav */
        }

        .hero-cards {
            display: flex;
            gap: 30px;
            margin-top: 60px;
        }

        .card {
            background-color: white;
            padding: 24px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 220px;
            text-align: center;
            transition: transform 0.3s ease;
            border: 1px solid #F1F5F9;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #E0F7FA;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            color: #0288D1;
            font-size: 20px;
        }

        .card-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            color: #37474F;
            font-size: 15px;
        }

<div class="bg-circle-2"></div>

</header>
<!-- Main Content -->
<main class="content">
<div class="text-center relative z-10">
<p class="text-sky-600 font-bold tracking-[0.2em] mb-4 uppercase text-sm font-montserrat">Corporate Learning Seminar</p>

                </h1>
<div class="w-24 h-1 bg-sky-400 mx-auto my-6 rounded-full"></div>
<p class="text-2xl text-slate-500 font-light tracking-wide"><strong>
                    Applied Competence for College &amp; Youth
                </strong></p>
</div>
<div class="hero-cards">
<div class="card">

<i class="fa-solid fa-layer-group"></i>
</div>

</div>
<div class="card">
<div class="icon-circle">
<i class="fa-solid fa-puzzle-piece"></i>
</div>
<p class="card-title">Identifying Gaps</p>
</div>
<div class="card">
<div class="icon-circle">
<i class="fa-solid fa-diagram-project"></i>
</div>
<p class="card-title">Logical Flow</p>
</div>

<nav class="nav-bar">

<div style="min-width: 150px;"></div>
<!-- Right Side -->

                Cognitive Shift
                <i class="fa-solid fa-arrow-right"></i>

<!-- ✅ Keyboard Navigation Added -->
<script>
document.addEventListener('keydown', function (e) {

    const activeTag = document.activeElement.tagName.toLowerCase();
    if (activeTag === 'input' || activeTag === 'textarea') return;

    if (e.key === 'ArrowRight') {
        window.location.href = 'f2.html';
    }

    if (e.key === 'ArrowLeft') {
        // First slide → no previous
    }
});
</script>
