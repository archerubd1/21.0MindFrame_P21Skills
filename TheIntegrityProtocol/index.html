<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Integrity Protocol</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        /* Main container layout */
        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            background-color: #FAFAFA;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Pseudo-gradient background using blurred blobs to avoid CSS gradient export issues */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-color: #FDF4FF; /* Very light base pink/purple */
        }
        
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
        }
        
        .blob-1 {
            top: -150px;
            left: -150px;
            width: 800px;
            height: 800px;
            background-color: #E9D5FF; /* Light Purple 200 */
        }
        
        .blob-2 {
            bottom: -200px;
            right: -100px;
            width: 900px;
            height: 900px;
            background-color: #FBCFE8; /* Light Pink 200 */
        }

        .blob-3 {
            top: 40%;
            left: 40%;
            width: 400px;
            height: 400px;
            background-color: #FFFFFF;
            opacity: 0.6;
        }

        /* Content Layer */
        .content-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        /* Glassmorphism Navigation */
        .glass-nav {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            border-radius: 999px; /* Full rounded corners */
            transition: all 0.3s ease;
        }

        .glass-nav:hover {
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
        }

        /* Typography spacing */
        h1 {
            letter-spacing: -0.02em;
        }
        
        .fade-in {
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .illustration-container {
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 40px -10px rgba(167, 139, 250, 0.15);
        }
/* Navigation */
.navbar {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    padding: 10px 25px;
    display: flex;
    justify-content: space-between;
     background-color: #FDF4FF;
    backdrop-filter: blur(8px);
    border-top: 1px solid rgba(255,255,255,0.5);
    border-radius: 10px;
}

.nav-link {
    font-size: 14px;
    cursor: pointer;
    transition: 0.25s ease;
}

.nav-link:hover {
    opacity: 0.7;
    transform: translateY(-2px);
}

    </style>
</head>
<body>
<div class="slide-container" id="slide-1">
<!-- Background Elements -->
<div class="bg-layer">
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
</div>
<!-- Main Content Wrapper -->
<div class="content-layer">
<!-- Header -->
<header class="px-12 py-8 w-full flex justify-between items-center opacity-70">
<p class="text-[11px] font-bold tracking-widest text-gray-500 uppercase font-sans">
                    EduuAspire21.0 Skills <span class="mx-2 text-purple-300">|</span> 21st Century Skills <span class="mx-2 text-purple-300">|</span> Information Literacy
                </p>
</header>
<!-- Center Content -->
<main class="flex-1 flex flex-col justify-center items-center text-center px-20 -mt-10 fade-in">
<!-- Illustration -->
<div class="illustration-container bg-white bg-opacity-40 p-6 mb-8 backdrop-blur-sm border border-white border-opacity-50">
<!-- Using a clean, abstract academic/integrity icon based on search results -->
<img alt="Academic Integrity Illustration" class="w-48 h-48 object-cover rounded-3xl opacity-95 shadow-md" src="https://page.gensparksite.com/slides_images/391a4acae55e53c9165ac8ba3857893b.webp"/>
</div>
<!-- Title -->
<h1 class="text-7xl font-bold text-gray-800 mb-6 relative">
<span class="bg-clip-text text-transparent" style="color: #4B5563;">The Integrity</span>
<span style="color: #7C3AED;">Protocol</span>
</h1>
<!-- Separator -->
<div class="w-16 h-1.5 bg-gradient-to-r from-pink-300 to-purple-400 rounded-full mb-6 opacity-60"></div>
<!-- Subtitle -->
<h2 class="text-2xl text-gray-600 font-light tracking-wide">
                    College &amp; Youth – Applied Competence
                </h2>
<!-- Decorative tag -->
<div class="mt-8 px-4 py-1.5 bg-purple-100 bg-opacity-50 rounded-lg border border-purple-200">
<p class="text-xs text-purple-700 font-medium uppercase tracking-wide">Spring 2026 Semester</p>
</div>
</main>
<!-- Footer -->
<footer class="px-12 py-6 w-full text-center relative z-20">
<p class="text-[10px] text-gray-400 font-medium tracking-wide">
                    Licenced &amp; Powered By Astrl Mind Technologies © 2026–2033
                </p>
</footer>
<!-- 🔥 NAVIGATION -->
<div class="navbar">
    <div class="nav-link" onclick="prev()"></div>
    <div class="nav-link" onclick="next()">Overview →</div>
</div>

</nav>
</div>
</div>
</div>
<script>

// Navigation
function next() {
    window.location.href = "a2.html";   // ✅ FIXED
}

// Keyboard
document.addEventListener('keydown', function(e) {

    if (e.key === "ArrowRight") next();
    if (e.key === "ArrowLeft") prev();

});
</script>
</body>
</html>
