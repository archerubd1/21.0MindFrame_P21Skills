<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Media Detective - Slide 10</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&amp;family=Poppins:wght@600;700&amp;family=Open+Sans:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            background-color: #FFF8DC;
            font-family: 'Open Sans', sans-serif;
            overflow: hidden; /* No scrolling */
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Montserrat', sans-serif;
        }
        .glass-nav {
            background: rgba(255, 204, 170, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
        }
        .nav-btn {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .nav-btn:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }
        /* Fix for absolute centering */
        .slide-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            text-align: center;
        }
        .award-badge {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="relative">
<!-- HEADER (MANDATORY) -->
<header class="fixed top-0 left-0 w-full bg-white/80 backdrop-blur-sm shadow-sm z-50 py-3 px-8 flex items-center justify-between">
<div class="text-gray-800 font-bold font-[Poppins] text-lg tracking-wide">
            EduuAspire21.0 Skills <span class="text-gray-400 mx-2">|</span> 21st Century Skills <span class="text-gray-400 mx-2">|</span> Media Literacy
        </div>
</header>
<!-- MAIN CONTENT -->
<main class="slide-content flex flex-col items-center justify-center">
<div class="mb-4 text-gray-500 font-bold uppercase tracking-widest text-sm">
            Course Completed
        </div>
<div class="mb-8 relative award-badge">
<!-- Background glow -->
<div class="absolute inset-0 bg-yellow-400 rounded-full blur-xl opacity-30 transform scale-150"></div>
<!-- Icon -->
<i class="fa-solid fa-certificate text-9xl text-yellow-500 drop-shadow-lg relative z-10"></i>
<i class="fa-solid fa-check text-4xl text-white absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20"></i>
</div>
<h1 class="text-5xl md:text-6xl font-extrabold text-gray-800 mb-4 tracking-tight leading-tight">
            Junior Fact-Checker
        </h1>
<div class="w-24 h-2 bg-green-500 rounded-full mb-8"></div>
<div class="bg-white/60 backdrop-blur-sm p-8 rounded-2xl shadow-sm border border-white/50 max-w-2xl">
<p class="text-3xl md:text-4xl text-gray-700 font-bold font-[Montserrat] mb-2">
                "Think. Question. Verify."
            </p>
<p class="text-gray-600 mt-4 text-lg">
                You now have the skills to spot the truth in media.
            </p>
</div>
</main>
<!-- NAVIGATION SYSTEM (STRICT) -->
<nav class="fixed bottom-12 left-1/2 transform -translate-x-1/2 w-11/12 max-w-4xl glass-nav py-4 px-8 flex justify-between items-center z-40 shadow-lg">
<!-- Previous Topic -->
<div class="w-1/3 text-left">
<a class="nav-btn inline-flex items-center text-gray-800 hover:text-yellow-700 font-[Poppins] font-bold text-lg no-underline group" href="f9.html">
<i class="fa-solid fa-arrow-left mr-2 transition-transform group-hover:-translate-x-1"></i>
                Tools &amp; Skills
            </a>
</div>
<!-- Current Indicator -->
<div class="w-1/3 text-center">
<span class="bg-green-100 text-green-800 py-1 px-3 rounded-full font-bold text-xs uppercase tracking-widest border border-green-200">
                Completed
            </span>
</div>
<!-- Next Topic (Hidden/Disabled for Last Slide) -->
<div class="w-1/3 text-right">
<span class="text-gray-400 opacity-50 cursor-not-allowed font-[Poppins] font-semibold text-sm">
<!-- End of Course -->
</span>
</div>
</nav>
<!-- FOOTER (MANDATORY) -->
<footer class="fixed bottom-0 left-0 w-full bg-gray-100/90 border-t border-gray-200 py-2 px-4 z-50 text-center">
<p class="text-[10px] text-[#666] font-[Open Sans]">
            Licenced &amp; Powered By Astrl Mind Technologies copyright 2026-2033
        </p>
</footer>
<!-- EXTERNAL SCRIPT -->
<script src="script.js"></script>
<script>
    // Keyboard Interactivity (MANDATORY)
    document.addEventListener('keydown', function(event) {
        // Disable navigation when user is typing in input or textarea
        const activeTag = document.activeElement.tagName.toLowerCase();
        if (activeTag === 'input' || activeTag === 'textarea') {
            return;
        }

        if (event.key === 'ArrowRight') {
            // Last slide - no action
        } else if (event.key === 'ArrowLeft') {
            window.location.href = 'f9.html';
        }
    });
</script>
</body>
</html>
