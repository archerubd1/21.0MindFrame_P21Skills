<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Slide 1 - The Secure Professional</title>
<!-- Tailwind CSS for layout and utility classes -->
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Playfair+Display:wght@600;700&amp;display=swap" rel="stylesheet"/>
<!-- FontAwesome for Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        /* Base Styling & Dimensions */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #eceff1; /* Outer background to show slide edges */
        }
        
        .slide-container {
            width: 1280px;
            height: 720px;
            background-color: #fdf6e3; /* Light cream background */
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* Typography */
        .font-playfair { font-family: 'Playfair Display', serif; }
        .font-inter { font-family: 'Inter', sans-serif; }

        /* Theme Colors */
        .text-deep-brown { color: #3e2723; }
        .text-soft-brown { color: #8d6e63; }
        .bg-cream-accent { background-color: #f5f1e8; }
        .border-brown-light { border-color: rgba(141, 110, 99, 0.2); }
        .bg-deep-brown { background-color: #3e2723; }

        /* Navigation CSS (Exact from instructions) */
        .navbar {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            background: #f5f1e8;
            backdrop-filter: blur(8px);
            border-radius: 10px;
            border: 1px solid rgba(141, 110, 99, 0.15); /* Slight border for clarity */
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            z-index: 50;
        }
        .nav-link {
            cursor: pointer;
            color: #5a3e2b;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: opacity 0.2s ease;
        }
        .nav-link:hover {
            opacity: 0.7;
        }
        .nav-placeholder {
            width: 80px; /* To balance flex space when Previous is hidden */
        }

        /* Animations */
        .fade-in { animation: fadeIn 1.2s ease-out forwards; }
        .slide-up { animation: slideUp 1s ease-out forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.3s; }
        .delay-2 { animation-delay: 0.6s; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
.footer {
    position: absolute;
    bottom: 0;   /* 🔥 sticks to bottom */
    left: 0;
    width: 100%;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f1e8;
    border-top: 1px solid rgba(141, 110, 99, 0.2);
    z-index: 40;
}
    </style>
</head>
<body>
<div class="slide-container">
<!-- Header -->
<header class="w-full py-6 px-12 flex justify-between items-center border-b border-brown-light fade-in">
<div>
<p class="text-xs font-inter font-semibold tracking-widest text-soft-brown uppercase">EduuAspire21.0 Skills | 21st Century Skills | Financial Literacy</p>
</div>
<div>
<i class="fa-solid fa-shield-halved text-soft-brown text-xl"></i>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center justify-center px-24 text-center relative z-10">
<!-- Icon Accent -->
<div class="mb-8 p-5 rounded-full bg-cream-accent inline-flex items-center justify-center border border-brown-light shadow-sm slide-up">
<i class="fa-solid fa-building-columns text-5xl text-deep-brown"></i>
</div>
<!-- Title -->
<div class="slide-up delay-1 w-full max-w-4xl">
<h1 class="text-7xl font-playfair font-bold text-deep-brown leading-tight mb-8">
<p>The Secure Professional</p>
</h1>
</div>
<!-- Divider -->
<div class="h-1 w-24 bg-deep-brown mx-auto mb-8 rounded-full opacity-80 slide-up delay-1"></div>
<!-- Subtitle -->
<div class="slide-up delay-2">
<h2 class="text-2xl font-inter font-light text-soft-brown tracking-wide">
<p>Adults &amp; Professionals – Strategic Mastery</p>
</h2>
</div>
</main>
<footer class="footer">
    <p class="text-xs font-inter text-soft-brown opacity-80">
        Licenced & Powered By Astrl Mind Technologies © 2026–2033
    </p>
</footer>
<!-- Navigation -->
<nav class="navbar">
<!-- Slide 1: Only Next button -->
<div class="nav-placeholder"></div>
<div class="nav-link" onclick="next()">
<p>Overview</p> <i class="fa-solid fa-arrow-right"></i>
</div>
</nav>
</div>
<!-- Navigation Script (Exact from instructions) -->
<script>
    function next() {
        window.location.href = "s2.html"; // update per slide
    }
    function prev() {
        // No previous slide for Slide 1
    }
    document.addEventListener('keydown', function(e) {
        if (e.key === "ArrowRight") next();
        if (e.key === "ArrowLeft") prev();
    });
    </script>
</body>
</html>
