<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pixel Storytellers - Slide 1</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;family=Poppins:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f0f0f0;
            overflow: hidden;

display: flex;              /* IMPORTANT */
    justify-content: center;    /* horizontal center */
    align-items: center;        /* vertical center */
    height: 100vh;


        }

        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            background-color: #FFF2E6; /* Light pastel orange base */
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Decorative Shapes to simulate gradient/depth without using CSS gradients */
        .shape-blob-1 {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 600px;
            height: 600px;
            background-color: #FFE4E6; /* Soft Rose */
            border-radius: 50%;
            z-index: 0;
            opacity: 0.8;
        }
        
        .shape-blob-2 {
            position: absolute;
            bottom: -150px;
            left: -100px;
            width: 700px;
            height: 700px;
            background-color: #FFEDD5; /* Soft Orange */
            border-radius: 50%;
            z-index: 0;
            opacity: 0.8;
        }

        .shape-blob-3 {
            position: absolute;
            top: 20%;
            left: 15%;
            width: 100px;
            height: 100px;
            background-color: #FCA5A5; /* Light Red */
            border-radius: 50%;
            opacity: 0.2;
            z-index: 0;
        }

        /* Header Styles */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            color: #7c2d12; /* Darker orange/brown for contrast */
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Footer Styles */
        .footer {
            position: absolute;
            bottom: 5px; /* Below nav */
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 10px;
            color: #9ca3af;
            z-index: 10;
            padding-bottom: 5px;
        }

        /* Navigation Styles (Mandatory) */
        .navbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.7); /* Slightly more opaque for better visibility */
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255,255,255,0.5);
            border-radius: 10px;
            z-index: 20;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .nav-link {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            color: #ea580c; /* Orange-600 */
            font-size: 16px; /* Slightly larger for kids */
            cursor: pointer;
            transition: 0.25s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-link:hover {
            opacity: 0.7;
            transform: translateY(-2px);
        }

        /* Main Content Area */
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            text-align: center;
            padding-bottom: 40px; /* Space for nav */
        }

        .title-container {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
            padding: 40px 60px;
            border-radius: 30px;
            border: 2px solid #fff;
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.1);
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 72px;
            color: #ea580c; /* Orange-600 */
            margin: 0;
            line-height: 1.1;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.8);
        }

        h2 {
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 32px;
            color: #ef4444; /* Red-500 */
            margin: 10px 0 0 0;
            letter-spacing: 1px;
        }

        .icon-decoration {
            font-size: 80px;
            color: #f87171;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .pixel-art-decoration {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .pixel-dot {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

    </style>
</head>
<body>
<div class="slide-container">
<!-- Background Shapes -->
<div class="shape-blob-1"></div>
<div class="shape-blob-2"></div>
<div class="shape-blob-3"></div>
<!-- Header -->
<div class="header">
<p>EduuAspire21.0 Skills | 21st Century Skills | Digital Literacy</p>
</div>
<!-- Main Content -->
<div class="content-wrapper">
<div class="icon-decoration">
<i class="fa-solid fa-layer-group"></i>
</div>
<div class="title-container">
<h1>Pixel Storytellers</h1>
<h2>School Learners – Foundations</h2>
</div>
<!-- Decorative Elements -->
<div class="pixel-art-decoration">
<div class="pixel-dot" style="background-color: #FDBA74;"></div>
<div class="pixel-dot" style="background-color: #FB923C;"></div>
<div class="pixel-dot" style="background-color: #F87171;"></div>
<div class="pixel-dot" style="background-color: #EF4444;"></div>
<div class="pixel-dot" style="background-color: #FCA5A5;"></div>
</div>
</div>
<!-- Navigation -->
<div class="navbar">
<div></div> <!-- Empty div for spacing since only Next is needed -->
<div class="nav-link" onclick="next()">Next <i class="fa-solid fa-arrow-right"></i></div>
</div>
<!-- Footer -->
<div class="footer">
<p>Licenced &amp; Powered By Astrl Mind Technologies © 2026–2033</p>
</div>
</div>
<!-- Navigation Script -->
<script>
        function next() {
            window.location.href = "s2.html";
        }

        function prev() {
            // No previous slide for slide 1
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === "ArrowRight") next();
        });
    </script>
</body>
</html>
