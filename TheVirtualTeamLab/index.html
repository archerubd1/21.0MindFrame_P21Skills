<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Virtual Team Lab</title>

<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* 🔥 CENTER FIX */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f1f5f9;
    font-family: 'Inter', sans-serif;
}

/* Slide */
.slide-container {
    position: relative;
    width: 1280px;
    height: 720px;
    background: linear-gradient(135deg, #e8f4f8, #f0f4ff, #f5f0ff);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* Header */
.header-bar {
    height: 50px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
}

.header-left {
    display: flex;
    gap: 10px;
    font-size: 13px;
}

.header-logo {
    font-weight: 600;
    color: #1e3a5f;
}

.header-badge {
    background: #e0f2fe;
    padding: 4px 10px;
    border-radius: 20px;
}

/* Content */
.main-content {
    position: absolute;
    top: 50px;
    bottom: 80px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* Title */
.main-title {
    font-size: 48px;
    font-weight: 700;
}

.highlight {
    color: #3b82f6;
}

.subtitle {
    color: #64748b;
    margin-top: 10px;
}

/* Cards */
.feature-grid {
    display: flex;
    gap: 20px;
    margin-top: 30px;
}

.feature-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 220px;
    text-align: center;
}

/* Navigation */
.navbar {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    padding: 10px 25px;
    display: flex;
    justify-content: space-between;
    background: #f1f5f9;
    backdrop-filter: blur(8px);
    border-top: 1px solid rgba(255,255,255,0.5);
    border-radius: 10px;
}

.nav-link {
    font-size: 14px;
    cursor: pointer;
    transition: 0.25s ease;
}

.nav-link:hover {
    opacity: 0.7;
    transform: translateY(-2px);
}

/* Footer */
.footer-bar {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40px;
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
}
</style>
</head>

<body>

<div class="slide-container">

<!-- Header -->
<div class="header-bar">
<div class="header-left">
<div class="header-logo">EduuAspire21.0 Skills</div>
<span>|</span>
<span>21st Century Skills</span>
<span>|</span>
<span>Digital Literacy</span>
</div>
<div class="header-badge">Active</div>
</div>

<!-- Content -->
<div class="main-content">

<h1 class="main-title">The <span class="highlight">Virtual Team Lab</span></h1>
<p class="subtitle">College & Youth – Applied Competence</p>

<div class="feature-grid">
<div class="feature-card">Virtual Collaboration</div>
<div class="feature-card">Real-time Sync</div>
<div class="feature-card">Project Management</div>
</div>

</div>

<!-- 🔥 NAVIGATION -->
<div class="navbar">
    <div class="nav-link" onclick="prev()"></div>
    <div class="nav-link" onclick="next()">Overview →</div>
</div>

<!-- Footer -->
<div class="footer-bar">
<span>Licenced & Powered By Astrl Mind Technologies</span>
<span>© 2026–2033</span>
</div>

</div>

<script>

// Navigation
function next() {
    window.location.href = "f2.html";   // ✅ FIXED
}

// Keyboard
document.addEventListener('keydown', function(e) {

    if (e.key === "ArrowRight") next();
    if (e.key === "ArrowLeft") prev();

});
</script>

</body>
</html>
