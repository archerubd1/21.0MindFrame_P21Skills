<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Truth Detectives Title Slide</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;600&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>

<style>
body {
    margin: 0;
    padding: 0;
    background-color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.slide-container {
    width: 1280px;
    height: 720px;
    background-color: #050510;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 50px rgba(0,0,0,0.5);
}

.neon-text-blue {
    text-shadow: 0 0 5px rgba(59,130,246,0.8), 0 0 20px rgba(59,130,246,0.5);
}

.neon-text-purple {
    text-shadow: 0 0 5px rgba(168,85,247,0.8), 0 0 20px rgba(168,85,247,0.5);
}

.grid-line-h {
    position: absolute;
    left: 0;
    width: 100%;
    height: 1px;
    background-color: rgba(59,130,246,0.1);
}

.grid-line-v {
    position: absolute;
    top: 0;
    height: 100%;
    width: 1px;
    background-color: rgba(59,130,246,0.1);
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

.floating-element {
    animation: float 6s ease-in-out infinite;
}

.glow-blob {
    position: absolute;
    border-radius: 9999px;
    filter: blur(80px);
    opacity: 0.4;
    z-index: 0;
}
/* Navigation Buttons */
.nav-container{
    position:absolute;
    bottom:55px;
    left:50%;
    transform:translateX(-50%);
    width:900px;

    display:flex;
    justify-content:flex-end;
    align-items:center;

    z-index:100;
}

.nav-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;

    padding:10px 22px;

    background:rgba(15,23,42,.9);
    color:#fff;
    text-decoration:none;

    border:1px solid #3b82f6;
    border-radius:30px;

    font-size:14px;
    font-weight:600;

    transition:.3s;
}

.nav-btn:hover{
    background:#3b82f6;
    color:#fff;
    box-shadow:0 0 18px rgba(59,130,246,.5);
}

.nav-btn i{
    transition:.3s;
}

.nav-btn:hover .fa-arrow-right{
    transform:translateX(4px);
}

.nav-btn:hover .fa-arrow-left{
    transform:translateX(-4px);
}
</style>
</head>

<body>
<div class="slide-container font-['Space_Grotesk'] text-white">

<!-- GRID -->
<div class="absolute inset-0 pointer-events-none z-0">
<div class="grid-line-h" style="top:10%"></div>
<div class="grid-line-h" style="top:20%"></div>
<div class="grid-line-h" style="top:30%"></div>
<div class="grid-line-h" style="top:40%"></div>
<div class="grid-line-h" style="top:50%"></div>
<div class="grid-line-h" style="top:60%"></div>
<div class="grid-line-h" style="top:70%"></div>
<div class="grid-line-h" style="top:80%"></div>
<div class="grid-line-h" style="top:90%"></div>

<div class="grid-line-v" style="left:10%"></div>
<div class="grid-line-v" style="left:20%"></div>
<div class="grid-line-v" style="left:30%"></div>
<div class="grid-line-v" style="left:40%"></div>
<div class="grid-line-v" style="left:50%"></div>
<div class="grid-line-v" style="left:60%"></div>
<div class="grid-line-v" style="left:70%"></div>
<div class="grid-line-v" style="left:80%"></div>
<div class="grid-line-v" style="left:90%"></div>
</div>

<!-- HEADER -->
<div class="absolute top-0 w-full text-center py-2">
<p class="text-sm text-blue-400 font-bold uppercase tracking-widest">
EduuAspire21.0 Skills | 21st Century Skills | Digital Literacy
</p>
</div>

<!-- CONTENT -->
<div class="flex-1 flex flex-col items-center justify-center text-center">

<h1 class="text-8xl font-bold neon-text-blue">TRUTH</h1>
<h1 class="text-8xl font-bold neon-text-purple">DETECTIVES</h1>

<p class="mt-4 text-xl text-blue-300">Become a Digital Detective</p>

<img src="image1.png" class="w-52 mt-6">

</div>
<!-- Navigation -->
<div class="nav-container">
    <a href="f2.html" class="nav-btn">
        Module Overview
        <i class="fa-solid fa-arrow-right"></i>
    </a>

<!-- FOOTER -->
<div class="absolute bottom-0 w-full text-center py-2">
<p class="text-xs text-purple-300 uppercase">
Licenced & Powered By Astrl Mind Technologies copyright 2026-2033
</p>
</div>

</div>
<!-- ✅ Keyboard Navigation Added -->
<script>
document.addEventListener('keydown', function (e) {

    const activeTag = document.activeElement.tagName.toLowerCase();
    if (activeTag === 'input' || activeTag === 'textarea') return;

    if (e.key === 'ArrowRight') {
        window.location.href = 'f2.html';
    }

    if (e.key === 'ArrowLeft') {
        // First slide → no previous
    }
});
</script>
</body>
</html>
